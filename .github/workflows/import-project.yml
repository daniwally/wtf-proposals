name: Import Emergent Project

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Source repo (owner/repo)"
        required: true
      subdomain:
        description: "Subdomain for the project"
        required: true
      project_name:
        description: "Display name for the project"
        required: true

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wtf-proposals
        uses: actions/checkout@v4

      - name: Clone source repo
        run: |
          git clone https://github.com/${{ github.event.inputs.source_repo }}.git /tmp/source-repo

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "16"

      - name: Detect and build source project
        env:
          DISABLE_ESLINT_PLUGIN: "true"
          CI: "false"
          GENERATE_SOURCEMAP: "false"
          SKIP_PREFLIGHT_CHECK: "true"
        run: |
          cd /tmp/source-repo
          # Check if frontend directory exists (Emergent structure)
          if [ -d "frontend" ]; then
            cd frontend
          fi
          # Use yarn if yarn.lock exists, otherwise npm
          if [ -f "yarn.lock" ]; then
            npm install -g yarn
            yarn install
            yarn build
          else
            npm install --force
            npm run build
          fi

      - name: Copy build output
        run: |
          mkdir -p public/projects/${{ github.event.inputs.subdomain }}
          # Find the build output directory
          if [ -d "/tmp/source-repo/frontend/build" ]; then
            cp -r /tmp/source-repo/frontend/build/* public/projects/${{ github.event.inputs.subdomain }}/
          elif [ -d "/tmp/source-repo/build" ]; then
            cp -r /tmp/source-repo/build/* public/projects/${{ github.event.inputs.subdomain }}/
          elif [ -d "/tmp/source-repo/frontend/dist" ]; then
            cp -r /tmp/source-repo/frontend/dist/* public/projects/${{ github.event.inputs.subdomain }}/
          elif [ -d "/tmp/source-repo/dist" ]; then
            cp -r /tmp/source-repo/dist/* public/projects/${{ github.event.inputs.subdomain }}/
          else
            echo "No build output found!"
            exit 1
          fi

      - name: Update projects.json
        run: |
          cd $GITHUB_WORKSPACE
          node -e "
            const fs = require('fs');
            const path = 'src/data/projects.json';
            const projects = JSON.parse(fs.readFileSync(path, 'utf8'));
            const existing = projects.find(p => p.subdomain === '${{ github.event.inputs.subdomain }}');
            if (!existing) {
              projects.push({
                id: crypto.randomUUID(),
                name: '${{ github.event.inputs.project_name }}',
                subdomain: '${{ github.event.inputs.subdomain }}',
                repoUrl: '${{ github.event.inputs.source_repo }}',
                status: 'active',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
              });
            } else {
              existing.updatedAt = new Date().toISOString();
            }
            fs.writeFileSync(path, JSON.stringify(projects, null, 2));
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Import project: ${{ github.event.inputs.project_name }} → ${{ github.event.inputs.subdomain }}.wtf-agency.works"
          git push
